name: Notify website

on:
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - "**/*.png"
      - "**/*.jpg"
      - "**/*.jpeg"
      - "**/*.gif"
      - "**/*.webp"
      - "**/*.svg"
      - "!README.md"
      - "!.github/**"
  workflow_dispatch:

jobs:
  notify:
    name: Trigger website rebuild
    runs-on: ubuntu-latest

    steps:
      - name: Dispatch website build
        env:
          TOKEN: ${{ secrets.WEBSITE_REBUILD_TOKEN }}
        run: |
          curl --fail-with-body -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/ltyqa/MyWebsite/actions/workflows/build-site.yml/dispatches \
            -d '{"ref":"main"}'
